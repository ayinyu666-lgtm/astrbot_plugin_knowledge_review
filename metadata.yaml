name: astrbot_plugin_knowledge_review
display_name: 知识候选审核中心
desc: 候选知识治理与发布插件——收集来自 Memorix 等插件的候选知识，AI 自动分类，人工审核后自动发布到 AstrBot 知识库（RAG）。内置 WebUI 审核面板。
help: 安装后通过 WebUI 审核面板管理候选知识。使用 /kr_status 查看状态。外部插件通过 REST API 提交候选。
